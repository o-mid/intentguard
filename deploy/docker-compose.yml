services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: intentguard
      POSTGRES_PASSWORD: intentguard
      POSTGRES_DB: intentguard
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intentguard -d intentguard"]
      interval: 3s
      timeout: 3s
      retries: 20

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command: ["--host", "0.0.0.0", "--chain-id", "31337"]
    ports:
      - "8545:8545"

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://intentguard:intentguard@postgres:5432/intentguard?sslmode=disable
      JWT_SECRET: dev-only-change-me
      MIGRATIONS_PATH: /migrations
      CHAIN_RPC_URL: http://anvil:8545
      EXECUTOR_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      DEPLOYMENTS_PATH: /deployments/anvil.json
      PLANNER_MODE: mock
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      anvil:
        condition: service_started
